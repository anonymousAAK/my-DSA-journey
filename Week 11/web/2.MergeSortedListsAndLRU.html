<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Week 11 - Merge Sorted Lists + LRU Cache</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
  pre  { background: #111; color: #d8e1ff; padding: 1rem; border-radius: 8px; overflow:auto; }
  .row { display:flex; flex-wrap:wrap; gap:.5rem; align-items:center; margin: .5rem 0; }
  .node { background:#3498db; color:white; padding:.4rem .7rem; border-radius:6px; font-family:monospace; }
  .lru-node { background:#e67e22; color:white; padding:.4rem .7rem; border-radius:6px; font-family:monospace; }
  .arrow { color:#666; }
  button { margin: .25rem; padding: .4rem .8rem; cursor: pointer; }
  input { padding: .3rem; width: 4rem; }
  h1 { font-size: 1.4rem; }
  h2 { font-size: 1.1rem; margin-top: 1.5rem; }
  .label { font-family: monospace; color:#444; }
</style>
</head>
<body>
<h1>Week 11 — Merge Sorted Lists + LRU Cache</h1>
<!--
  WEEK 11 - WEB DSA
  Topic: Merge Two Sorted Lists + LRU Cache
  File: 2.MergeSortedListsAndLRU.html

  CONCEPT:
    PART A — Visualize merging two sorted singly-linked lists into one.
    PART B — Interactive LRU cache demo. Buttons fire put/get; the rendered
             chain shows the MRU->LRU order.

  KEY POINTS:
    - Merge: walk both lists, attach smaller, render after each step.
    - LRU: hashmap (Map) + doubly linked list with head/tail sentinels.

  ALGORITHM / APPROACH:
    Merge: while both pointers non-null, attach smaller; then attach tail.
    LRU.get / put: classic O(1) operations; render after each call.

  WEB-SPECIFIC NOTES:
    - We use ES6 Map for the hashmap (O(1) get/set/delete).
    - DOM rendering is the "output" channel; transcript also goes to <pre>.

  DRY RUN:
    merge [1,2,4] + [1,3,4] = [1,1,2,3,4,4]
    LRU(3): put 1,2,3 -> [3][2][1]; get(1) -> [1][3][2]; put(4) -> [4][1][3]

  COMPLEXITY:
    merge: O(m+n) time, O(1) space; LRU get/put: O(1) amortized.
-->

<h2>Part A — Merge Two Sorted Lists</h2>
<div class="row"><span class="label">L1:</span><div id="l1" class="row"></div></div>
<div class="row"><span class="label">L2:</span><div id="l2" class="row"></div></div>
<div class="row"><button onclick="doMerge()">Merge</button></div>
<div class="row"><span class="label">Merged:</span><div id="merged" class="row"></div></div>

<h2>Part B — LRU Cache (capacity 3)</h2>
<div class="row">
  key <input id="k" type="number" value="1">
  val <input id="v" type="number" value="10">
  <button onclick="doPut()">put(k,v)</button>
  <button onclick="doGet()">get(k)</button>
  <button onclick="doReset()">reset</button>
</div>
<div class="row"><span class="label">MRU →</span><div id="lru" class="row"></div><span class="label">← LRU</span></div>

<h2>Transcript</h2>
<pre id="out"></pre>

<script>
const out = document.getElementById("out");
function log(msg) { console.log(msg); out.textContent += msg + "\n"; out.scrollTop = out.scrollHeight; }

// ---------- Merge ----------
class LN { constructor(v){ this.val=v; this.next=null; } }
function fromArr(arr) {
  const d = new LN(0); let c = d;
  for (const x of arr) { c.next = new LN(x); c = c.next; }
  return d.next;
}
function renderInto(el, head, cls="node") {
  el.innerHTML = "";
  let first = true;
  for (let c = head; c; c = c.next) {
    if (!first) {
      const a = document.createElement("span");
      a.className = "arrow"; a.textContent = "→"; el.appendChild(a);
    }
    const n = document.createElement("span");
    n.className = cls; n.textContent = c.val; el.appendChild(n);
    first = false;
  }
  if (first) el.textContent = "(empty)";
}
function mergeSorted(a, b) {
  const d = new LN(0); let c = d;
  while (a && b) {
    if (a.val <= b.val) { c.next = a; a = a.next; }
    else                { c.next = b; b = b.next; }
    c = c.next;
  }
  c.next = a || b;
  return d.next;
}
const A = fromArr([1,2,4]);
const B = fromArr([1,3,4]);
renderInto(document.getElementById("l1"), A);
renderInto(document.getElementById("l2"), B);

function doMerge() {
  const A2 = fromArr([1,2,4]);  // rebuild because merge consumes
  const B2 = fromArr([1,3,4]);
  const m = mergeSorted(A2, B2);
  renderInto(document.getElementById("merged"), m);
  const arr = []; for (let c=m;c;c=c.next) arr.push(c.val);
  log("merged: " + arr.join(" -> "));
}

// ---------- LRU ----------
class LRUCache {
  constructor(cap) {
    this.cap = cap;
    this.map = new Map();
    this.head = { key: -1, val: -1, prev: null, next: null };  // sentinel MRU side
    this.tail = { key: -1, val: -1, prev: null, next: null };  // sentinel LRU side
    this.head.next = this.tail; this.tail.prev = this.head;
  }
  _remove(n) { n.prev.next = n.next; n.next.prev = n.prev; }
  _insertFront(n) {
    n.next = this.head.next; n.prev = this.head;
    this.head.next.prev = n; this.head.next = n;
  }
  get(k) {
    const n = this.map.get(k);
    if (!n) return -1;
    this._remove(n); this._insertFront(n);
    return n.val;
  }
  put(k, v) {
    let n = this.map.get(k);
    if (n) { n.val = v; this._remove(n); this._insertFront(n); return; }
    if (this.map.size === this.cap) {
      const lru = this.tail.prev;
      this._remove(lru); this.map.delete(lru.key);
    }
    n = { key:k, val:v, prev:null, next:null };
    this._insertFront(n); this.map.set(k, n);
  }
  toArr() {
    const arr = [];
    for (let c = this.head.next; c !== this.tail; c = c.next) arr.push([c.key, c.val]);
    return arr;
  }
}

let cache;
function renderLRU() {
  const el = document.getElementById("lru");
  el.innerHTML = "";
  const arr = cache.toArr();
  if (!arr.length) { el.textContent = "(empty)"; return; }
  for (let i = 0; i < arr.length; i++) {
    if (i > 0) {
      const a = document.createElement("span");
      a.className = "arrow"; a.textContent = "→"; el.appendChild(a);
    }
    const n = document.createElement("span");
    n.className = "lru-node"; n.textContent = `${arr[i][0]}=${arr[i][1]}`;
    el.appendChild(n);
  }
}
function doPut() {
  const k = +document.getElementById("k").value;
  const v = +document.getElementById("v").value;
  cache.put(k, v);
  log(`put(${k},${v}) -> ${JSON.stringify(cache.toArr())}`);
  renderLRU();
}
function doGet() {
  const k = +document.getElementById("k").value;
  const v = cache.get(k);
  log(`get(${k}) = ${v} -> ${JSON.stringify(cache.toArr())}`);
  renderLRU();
}
function doReset() {
  cache = new LRUCache(3);
  cache.put(1, 1); cache.put(2, 2); cache.put(3, 3);
  log("reset: put 1,2,3");
  renderLRU();
}

doReset();
</script>

<!--
NOTES (vs. Java):
- JS Map is the analogue of Java HashMap; both are O(1) amortized.
- We model DLL nodes as plain objects ({key,val,prev,next}); GC takes care
  of evicted nodes — much like Java.
- The merge demo uses fresh lists every click because merging consumes them
  (re-wires next pointers).
-->
</body>
</html>
