# .ci-known-drift.yml
#
# Files exempted from scripts/quality_check.py header check, with reason.
# Read by the script via the KNOWN_DRIFT_FILE constant.
#
# Format: '<repo-relative-path>: <human-readable reason>'
# Lines starting with '#' and blank lines are ignored.
#
# Adding an entry should be a conscious decision: it means "this file
# legitimately does not follow the schema and that's OK because <reason>".
# Do NOT use this to silence genuine drift in new files — fix the file
# instead. The list below was captured at the point where CI flipped from
# report-only to gating; new contributions should not extend it without a
# documented reason in the PR description.
#
# See scripts/QUALITY_CHECK.md for the full policy.

