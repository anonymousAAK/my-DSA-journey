site_name: My DSA Journey
site_description: 30 weeks, 4 languages — a structured guide to mastering data structures and algorithms as problem-solving, not memorization.
site_url: https://anonymousAAK.github.io/my-DSA-journey/
repo_url: https://github.com/anonymousAAK/my-DSA-journey
repo_name: anonymousAAK/my-DSA-journey
edit_uri: edit/main/

# Build a curated symlink-farm under site_src/ before mkdocs runs.
# mkdocs requires docs_dir to be a child of the config file, so we cannot
# point at the repo root. scripts/prepare_site.sh creates site_src/ by
# symlinking every file/folder referenced from the nav: below.
#
#   bash scripts/prepare_site.sh && mkdocs build --strict
#
# The CI workflow (.github/workflows/site.yml) runs prepare_site.sh as a
# step before mkdocs.
docs_dir: site_src

# site_src/ is generated; everything inside is a symlink to live content.
# No exclude_docs needed because we explicitly pick what goes in.

# Link validation: many docs intentionally link to source code (e.g.
# Week N/python/2.hello_world.py) and other files that aren't part of the
# rendered site. Demote those to info so --strict only fails on real
# config / parse problems, not cross-tree references.
validation:
  links:
    absolute_links: ignore
    unrecognized_links: info
    not_found: info
  nav:
    not_found: warn
    omitted_files: ignore

theme:
  name: material
  language: en
  palette:
    # Match the existing web/index.html dark palette
    # background #0d1117, surface #161b22, primary #58a6ff, accent #3fb950
    - scheme: slate
      primary: blue
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anonymousAAK/my-DSA-journey
      name: my-DSA-journey on GitHub

# Theme overrides — site_src/docs/assets/theme.css after symlink farm.
extra_css:
  - docs/assets/theme.css

plugins:
  - search
  # Optional plugins (install separately if you want them):
  #   pip install mkdocs-awesome-pages-plugin   # auto nav from .pages files
  #   pip install mkdocs-git-revision-date-localized-plugin
  #   pip install mkdocs-minify-plugin
  # They are intentionally NOT required here to keep deps minimal.

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

