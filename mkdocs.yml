site_name: My DSA Journey
site_description: 30 weeks, 4 languages — a structured guide to mastering data structures and algorithms as problem-solving, not memorization.
site_url: https://anonymousAAK.github.io/my-DSA-journey/
repo_url: https://github.com/anonymousAAK/my-DSA-journey
repo_name: anonymousAAK/my-DSA-journey
edit_uri: edit/main/

# Use the repository root as the docs source. The existing markdown (README.md,
# PROBLEM_SOLVING.md, QUICKSTART.md, docs/, case_studies/, capstones/, and each
# Week N/README.md) is rendered in place.
docs_dir: .

# Keep code, build output, configuration, and binary directories out of the site.
exclude_docs: |
  .git/
  .github/
  .devcontainer/
  __pycache__/
  scripts/__pycache__/
  dist/
  site/
  tests/cases/
  tests/refs/
  tests/harness/
  Week */java/
  Week */cpp/
  Week */python/
  Week */rust/
  Week */web/
  Week */mastery.yml
  capstones/solutions/
  mkdocs.yml
  requirements.txt
  LICENSE

theme:
  name: material
  language: en
  palette:
    # Match the existing web/index.html dark palette
    # background #0d1117, surface #161b22, primary #58a6ff, accent #3fb950
    - scheme: slate
      primary: blue
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anonymousAAK/my-DSA-journey
      name: my-DSA-journey on GitHub

extra_css:
  - docs/assets/theme.css

# Override Material's slate colors to exactly match the existing web palette.
# (theme.css is created lazily; if absent, Material falls back to defaults.)

plugins:
  - search
  # Optional plugins (install separately if you want them):
  #   pip install mkdocs-awesome-pages-plugin   # auto nav from .pages files
  #   pip install mkdocs-git-revision-date-localized-plugin
  #   pip install mkdocs-minify-plugin
  # They are intentionally NOT required here to keep deps minimal.

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

