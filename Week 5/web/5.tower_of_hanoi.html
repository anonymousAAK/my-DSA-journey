<!--
WEEK 5 - WEB FUNCTIONS & RECURSION
Topic: Tower of Hanoi
File: 5.tower_of_hanoi.html

COMPLEXITY: O(2^n).
-->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Week 5 - Hanoi</title>
<style>body{font-family:system-ui,sans-serif;max-width:720px;margin:2rem auto;padding:0 1rem}pre{background:#111;color:#0f0;padding:1rem;border-radius:6px}input{padding:.25rem}</style>
</head>
<body>
<h1>Tower of Hanoi</h1>
<label>n (disks) <input id="n" type="number" value="3" min="0" max="10"></label>
<pre id="out"></pre>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const out = document.getElementById("out");
  const log = (...a) => { out.textContent += a.join(" ") + "\n"; };

  let count = 0;
  function hanoi(n, src, aux, dst) {
    if (n === 0) return;
    hanoi(n - 1, src, dst, aux);
    count++;
    log(`Move disk ${n}: ${src} -> ${dst}`);
    hanoi(n - 1, aux, src, dst);
  }

  const render = () => {
    out.textContent = "";
    count = 0;
    const n = Number(document.getElementById("n").value);
    hanoi(n, "A", "B", "C");
    log(`Total moves: ${count}  (expected ${(2**n) - 1})`);
    log("");
    log("Disks | Moves");
    log("------+------");
    for (let i = 1; i <= 20; i++) log(`  ${String(i).padStart(2)}  | ${(2n ** BigInt(i)) - 1n}`);
  };
  render();
  document.getElementById("n").addEventListener("input", render);
});
</script>
</body>
</html>

<!--
NOTES:
 - We cap UI input at n=10 so the page doesn't print 2^n moves for huge n.
 - For n=64 the move count is ~1.8e19 -- BigInt is required to compute it.
-->
