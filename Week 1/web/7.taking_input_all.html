<!--
WEEK 1 - WEB FUNDAMENTALS
Topic: Reading All Common Input Types
File: 7.taking_input_all.html

CONCEPT:
The browser surfaces input as raw strings. To match Java's Scanner methods
you need:
  - `Number(s)`         -> nextInt / nextDouble (returns NaN on bad input)
  - `parseInt(s, 10)`    -> nextInt (forgiving: stops at first non-digit)
  - `parseFloat(s)`      -> nextFloat / nextDouble
  - `BigInt(s)`          -> nextLong / arbitrary precision
  - first token  -> `s.split(/\s+/)[0]`
  - first char   -> `s[0]`

KEY POINTS:
 - `Number("12abc")` -> NaN  (strict)
 - `parseInt("12abc", 10)` -> 12  (forgiving)
 - BigInt arithmetic uses the `n` suffix.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Week 1 - All input types</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    pre  { background: #111; color: #0f0; padding: 1rem; border-radius: 6px; }
    textarea { width: 100%; height: 6em; font-family: monospace; }
    button{ margin-top: 1rem; padding: .5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Reading All Common Input Types</h1>
  <p>Whitespace-separated tokens (defaults provided):</p>
  <textarea id="in">10 5 hello 3.14 12345678901234567890</textarea>
  <button id="run">Parse</button>
  <pre id="out"></pre>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const out = document.getElementById("out");
      const log = (...a) => { out.textContent += a.join(" ") + "\n"; console.log(...a); };

      const run = () => {
        out.textContent = "";
        const raw = document.getElementById("in").value;
        const tokens = raw.split(/\s+/).filter(Boolean);

        const a = Number(tokens[0]);
        const b = Number(tokens[1]);
        log("a + b =", a + b);

        const word = tokens[2] || "";
        log(`First char of '${word}' = '${word[0] || ''}'`);

        log("parseFloat:", parseFloat(tokens[3]));
        log("BigInt    :", BigInt(tokens[4]).toString());
      };
      run();
      document.getElementById("run").addEventListener("click", run);
    });
  </script>
</body>
</html>

<!--
NOTES:
 - Java distinguishes int / long / float / double. JS has Number + BigInt.
 - Number constructor is strict; parseInt/parseFloat are lenient.
 - In Node.js you would read tokens via readline / process.stdin.
-->
