<h1>Week 19 - Greedy Algorithms</h1>
<p>Activity selection, fractional knapsack, min coins, merge intervals, min meeting rooms.</p>
<pre id="out"></pre>

<script>
/*
WEEK 19 - WEB (JavaScript) DSA
Topic: Greedy Algorithms — Paradigm + Classic Problems
File: 1.GreedyAlgorithms.html

CONCEPT:
    Greedy algorithms commit to the locally optimal choice at every step.
    They work when the problem has greedy-choice property + optimal
    substructure. Typical complexity: O(n log n) due to a sort.

KEY POINTS:
    - Sort + scan is the dominant pattern.
    - JS has no built-in heap; we implement a tiny binary min-heap for
      the meeting-rooms problem.
    - Array.prototype.sort sorts strings by default; pass a comparator
      `(a, b) => a - b` for numbers.

ALGORITHM / APPROACH:
    Five canonical problems:
      1. Activity Selection         (sort by end; pick non-overlapping)
      2. Fractional Knapsack        (sort by value/weight desc)
      3. Min Coins (canonical)      (always take largest coin)
      4. Merge Intervals            (sort by start; merge overlaps)
      5. Min Meeting Rooms          (sort + min-heap of end times)

JS-SPECIFIC NOTES:
    - Comparators MUST return a number (positive/negative/zero) for sort.
    - Spread `[...arr].sort(...)` to avoid mutating the input.
    - For min-heap with priority other than the value itself, store [key, val].

DRY RUN:
    Activity Selection [1,3,0,5,8,5] / [2,4,6,7,9,9]
        sort by end: order [0,1,3,2,4,5] -> ends [2,4,7,6,9,9]
        pick 0; 1 (3>=2); 3 (5>=4); skip 2; 4 (8>=7); skip 5  ->  4

    Min Meeting Rooms [[0,30],[5,10],[15,20]]
        heap=[30]; 5<30 push 10 -> heap=[10,30];
        15>=10 pop 10 push 20 -> heap=[20,30]; size=2.

COMPLEXITY:
    activitySelection      O(n log n)
    fractionalKnapsack     O(n log n)
    minCoinsGreedy         O(c log c)
    mergeIntervals         O(n log n)
    minMeetingRooms        O(n log n)
*/

const out = document.getElementById('out');
const log = (...a) => {
  const line = a.map(x => typeof x === 'string' ? x : JSON.stringify(x)).join(' ');
  out.textContent += line + '\n';
  console.log(...a);
};

// Tiny min-heap of numbers.
class MinHeap {
  constructor() { this.h = []; }
  size() { return this.h.length; }
  peek() { return this.h[0]; }
  push(x) {
    this.h.push(x);
    let i = this.h.length - 1;
    while (i > 0) {
      const p = (i - 1) >> 1;
      if (this.h[p] <= this.h[i]) break;
      [this.h[p], this.h[i]] = [this.h[i], this.h[p]];
      i = p;
    }
  }
  pop() {
    const top = this.h[0];
    const last = this.h.pop();
    if (this.h.length) {
      this.h[0] = last;
      let i = 0;
      while (true) {
        const l = 2 * i + 1, r = 2 * i + 2;
        let best = i;
        if (l < this.h.length && this.h[l] < this.h[best]) best = l;
        if (r < this.h.length && this.h[r] < this.h[best]) best = r;
        if (best === i) break;
        [this.h[best], this.h[i]] = [this.h[i], this.h[best]];
        i = best;
      }
    }
    return top;
  }
}

// 1. ACTIVITY SELECTION
function activitySelection(start, end) {
  const n = start.length;
  if (n === 0) return 0;
  const idx = [...Array(n).keys()].sort((a, b) => end[a] - end[b]);
  let count = 1, lastEnd = end[idx[0]];
  for (let k = 1; k < n; k++) {
    if (start[idx[k]] >= lastEnd) {
      count++;
      lastEnd = end[idx[k]];
    }
  }
  return count;
}

// 2. FRACTIONAL KNAPSACK
function fractionalKnapsack(weights, values, capacity) {
  const n = weights.length;
  const idx = [...Array(n).keys()]
      .sort((a, b) => (values[b] / weights[b]) - (values[a] / weights[a]));
  let total = 0, remaining = capacity;
  for (const i of idx) {
    if (remaining <= 0) break;
    const take = Math.min(weights[i], remaining);
    total += take * values[i] / weights[i];
    remaining -= take;
  }
  return total;
}

// 3. MIN COINS (canonical systems)
function minCoinsGreedy(coins, target) {
  const sorted = [...coins].sort((a, b) => b - a);
  const result = {};
  for (const c of sorted) {
    if (target <= 0) break;
    if (c <= target) {
      const count = Math.floor(target / c);
      result[c] = count;
      target -= c * count;
    }
  }
  return result;
}

// 4. MERGE INTERVALS
function mergeIntervals(intervals) {
  if (intervals.length <= 1) return intervals.map(iv => iv.slice());
  const sorted = [...intervals].sort((a, b) => a[0] - b[0]);
  const merged = [sorted[0].slice()];
  for (let i = 1; i < sorted.length; i++) {
    const last = merged[merged.length - 1];
    if (sorted[i][0] <= last[1]) {
      last[1] = Math.max(last[1], sorted[i][1]);
    } else {
      merged.push(sorted[i].slice());
    }
  }
  return merged;
}

// 5. MIN MEETING ROOMS
function minMeetingRooms(intervals) {
  if (intervals.length === 0) return 0;
  const sorted = [...intervals].sort((a, b) => a[0] - b[0]);
  const heap = new MinHeap();
  heap.push(sorted[0][1]);
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i][0] >= heap.peek()) heap.pop();
    heap.push(sorted[i][1]);
  }
  return heap.size();
}

// ---------- driver ----------
log('=== Activity Selection ===');
log('Max activities:', activitySelection([1,3,0,5,8,5], [2,4,6,7,9,9]));   // 4

log('\n=== Fractional Knapsack ===');
log('Max value:', fractionalKnapsack([10,20,30], [60,100,120], 50).toFixed(2)); // 240.00

log('\n=== Min Coins (US denominations) ===');
log('Change for 87:', minCoinsGreedy([1,5,10,25,50,100], 87));
log('Change for 30:', minCoinsGreedy([1,5,10,25,50,100], 30));

log('\n=== Merge Intervals ===');
log('Merged:', mergeIntervals([[1,3],[2,6],[8,10],[15,18]]));
// [[1,6],[8,10],[15,18]]

log('\n=== Min Meeting Rooms ===');
log('Rooms needed:', minMeetingRooms([[0,30],[5,10],[15,20]]));            // 2
log('Rooms needed:', minMeetingRooms([[7,10],[2,4]]));                     // 1

/*
NOTES (JavaScript vs Java):
  - JS sort default is LEXICOGRAPHIC -- always pass a numeric comparator.
  - No built-in heap; the MinHeap class above is the standard interview
    boilerplate. For production use a library (e.g., heap-js).
  - Object keys are stringified, so minCoinsGreedy returns "10": 1, etc.;
    that's still useful for display.
  - Math.floor for integer division; / on JS numbers is float.
*/
</script>
