<!--
  WEEK 8 - WEB DSA
  Topic: Binary Search
  File: 1.binary_search.html

  CONCEPT:
    Find a value in a sorted array in O(log n) by halving the search range.

  KEY POINTS:
    - Array must be sorted.
    - Compute mid as low + ((high - low) >> 1) to mimic Java's safe form.
    - Variants: first/last occurrence, count, rotated-array search.

  ALGORITHM / APPROACH:
    Same iterative + recursive logic as Java/Python; ported to JS.

  WEB-SPECIFIC NOTES:
    - JS numbers are doubles, but bitwise ops coerce to 32-bit signed.
    - Output piped to console + <pre>.

  DRY RUN:
    [-5,-2,0,1,3,5,7,9,11], target=5 -> index 5.
    Rotated [4,5,6,7,0,1,2], target=0 -> index 4.

  COMPLEXITY:
    Time:  O(log n)
    Space: O(1) iterative, O(log n) recursive
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Week 8 - Binary Search</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 1.5rem; }
  pre  { background: #111; color: #eee; padding: 1rem; border-radius: 8px; }
  h1   { font-size: 1.2rem; }
</style>
</head>
<body>
<h1>Week 8 - Binary Search</h1>
<pre id="out"></pre>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const out = document.getElementById("out");
  const lines = [];
  const log = (s) => { lines.push(s); console.log(s); };

  function binarySearch(arr, target) {
    let low = 0, high = arr.length - 1;
    while (low <= high) {
      const mid = low + ((high - low) >> 1);
      if (arr[mid] === target) return mid;
      else if (arr[mid] < target) low = mid + 1;
      else high = mid - 1;
    }
    return -1;
  }

  function binarySearchRec(arr, target, low, high) {
    if (low > high) return -1;
    const mid = low + ((high - low) >> 1);
    if (arr[mid] === target) return mid;
    if (arr[mid] < target) return binarySearchRec(arr, target, mid + 1, high);
    return binarySearchRec(arr, target, low, mid - 1);
  }

  function firstOccurrence(arr, target) {
    let low = 0, high = arr.length - 1, result = -1;
    while (low <= high) {
      const mid = low + ((high - low) >> 1);
      if (arr[mid] === target) { result = mid; high = mid - 1; }
      else if (arr[mid] < target) low = mid + 1;
      else high = mid - 1;
    }
    return result;
  }

  function lastOccurrence(arr, target) {
    let low = 0, high = arr.length - 1, result = -1;
    while (low <= high) {
      const mid = low + ((high - low) >> 1);
      if (arr[mid] === target) { result = mid; low = mid + 1; }
      else if (arr[mid] < target) low = mid + 1;
      else high = mid - 1;
    }
    return result;
  }

  function countOccurrences(arr, target) {
    const f = firstOccurrence(arr, target);
    if (f === -1) return 0;
    return lastOccurrence(arr, target) - f + 1;
  }

  function searchRotated(arr, target) {
    let low = 0, high = arr.length - 1;
    while (low <= high) {
      const mid = low + ((high - low) >> 1);
      if (arr[mid] === target) return mid;
      if (arr[low] <= arr[mid]) {
        if (arr[low] <= target && target < arr[mid]) high = mid - 1;
        else low = mid + 1;
      } else {
        if (arr[mid] < target && target <= arr[high]) low = mid + 1;
        else high = mid - 1;
      }
    }
    return -1;
  }

  const sorted = [-5, -2, 0, 1, 3, 5, 7, 9, 11];
  log(`Array: [${sorted}]`);
  log(`binarySearch(5) = ${binarySearch(sorted, 5)}`);
  log(`binarySearch(0) = ${binarySearch(sorted, 0)}`);
  log(`binarySearch(4) = ${binarySearch(sorted, 4)}`);
  log(`binarySearchRec(7) = ${binarySearchRec(sorted, 7, 0, sorted.length - 1)}`);

  const withDups = [1, 2, 2, 2, 3, 4, 4, 5];
  log(`\nArray with duplicates: [${withDups}]`);
  log(`firstOccurrence(2) = ${firstOccurrence(withDups, 2)}`);
  log(`lastOccurrence(2)  = ${lastOccurrence(withDups, 2)}`);
  log(`countOccurrences(2) = ${countOccurrences(withDups, 2)}`);
  log(`countOccurrences(4) = ${countOccurrences(withDups, 4)}`);
  log(`countOccurrences(6) = ${countOccurrences(withDups, 6)}`);

  const rotated = [4, 5, 6, 7, 0, 1, 2];
  log(`\nRotated array: [${rotated}]`);
  log(`searchRotated(0) = ${searchRotated(rotated, 0)}`);
  log(`searchRotated(6) = ${searchRotated(rotated, 6)}`);
  log(`searchRotated(3) = ${searchRotated(rotated, 3)}`);

  out.textContent = lines.join("\n");
});
</script>
</body>
</html>

<!--
  NOTES — Web/JS vs Java:
    - >> shift gives integer division by 2 within 32-bit range — fine for typical sizes.
    - No built-in binary search; lodash / sorted-array libraries exist if needed.
    - JS number type does not overflow before 2^53; the safe-mid pattern is mostly habitual.
-->
