name: Certification claim
description: Claim a DSA Journey credential (Foundation / Practitioner / Master).
title: "[cert] "
labels: ["certification", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to claim a DSA Journey credential.  Before
        filing, please skim **docs/CERTIFICATION.md** and
        **docs/CERTIFICATION_LEVELS.md** to make sure you meet the bar
        for the level you're targeting.

        A maintainer will run `scripts/verify_certification.py` against
        the materials you submit, then — if everything checks out —
        post a signed `credential.json` back here and add you to
        `CERTIFIED_LEARNERS.md`.

  - type: input
    id: github_user
    attributes:
      label: GitHub username
      description: Your `@handle` exactly as it appears on github.com.  This is what will be recorded in the credential and on the public roster.
      placeholder: "octocat"
    validations:
      required: true

  - type: dropdown
    id: level
    attributes:
      label: Level you're claiming
      description: See docs/CERTIFICATION_LEVELS.md for the rubric.
      options:
        - Foundation (Weeks 1-10, 1 capstone)
        - Practitioner (Weeks 1-20, 2 capstones)
        - Master (Weeks 1-30, all phase 1-3 capstones OR any 4 capstones + showcase)
    validations:
      required: true

  - type: textarea
    id: progress_json
    attributes:
      label: progress.json
      description: |
        Paste the **entire** contents of your `~/.journey/progress.json`
        inside a fenced code block.  If it's huge, you may instead link
        to a public gist containing the file — but the contents must be
        publicly reachable so a maintainer can verify it.
      render: json
      placeholder: |
        {
          "weeks": { "1": { "rate": 100, "passed": [...], "missed": [] }, ... },
          "current_week": 30,
          "history": [...]
        }
    validations:
      required: true

  - type: textarea
    id: capstone_prs
    attributes:
      label: Capstone PR links
      description: |
        One PR per line, pointing at your submitted capstones in `showcase/`
        (or equivalent fork).  Minimum 1 for Foundation, 2 for Practitioner,
        4 (or capstones 1-3 + a showcase submission) for Master.
      placeholder: |
        https://github.com/<user>/<fork>/pull/123
        https://github.com/<user>/<fork>/pull/124
        https://github.com/<user>/<fork>/pull/125
    validations:
      required: true

  - type: input
    id: showcase
    attributes:
      label: Showcase submission (Master only)
      description: Link to your entry in `showcase/`.  Leave blank if not claiming Master.
      placeholder: https://github.com/<user>/<fork>/tree/main/showcase/<yourname>
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Optional.  Mention review accommodations, special-case capstones, or context a verifier might need.
    validations:
      required: false

  - type: checkboxes
    id: attestation
    attributes:
      label: Self-attestation
      description: Everything below must be true for the claim to be valid.
      options:
        - label: I confirm that the `progress.json` above was generated by my own runs of the `journey` CLI — no hand edits, no copied data.
          required: true
        - label: I confirm that all linked capstone PRs were authored by me (LLM assistance is fine, wholesale copies are not).
          required: true
        - label: I have read `docs/CERTIFICATION.md` and understand that credentials are revocable if any of the above turn out to be untrue.
          required: true
