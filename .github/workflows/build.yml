name: Build & Smoke Test

on:
  push:
    branches: [main, "claude/**", "codex/**"]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Compile every Python file
        run: |
          set -e
          find "Week "* -maxdepth 2 -name "*.py" -print0 | xargs -0 -n1 python3 -m py_compile

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile every C++ file
        run: |
          set -e
          mkdir -p /tmp/cpp-out
          fail=0
          while IFS= read -r -d '' f; do
            out="/tmp/cpp-out/$(basename "$f" .cpp).out"
            if ! g++ -std=c++17 -Wno-everything "$f" -o "$out" 2>>/tmp/cpp-errors.log; then
              echo "FAIL: $f"; fail=1
            fi
          done < <(find "Week "* -maxdepth 2 -name "*.cpp" -print0)
          if [ "$fail" -ne 0 ]; then echo "--- error log ---"; cat /tmp/cpp-errors.log; exit 1; fi

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile every Rust file
        run: |
          set -e
          mkdir -p /tmp/rust-out
          fail=0
          while IFS= read -r -d '' f; do
            base=$(basename "$f" .rs)
            crate=$(echo "$base" | tr -c 'A-Za-z0-9_' '_' | sed 's/^[0-9]/c&/')
            out="/tmp/rust-out/${crate}"
            if ! rustc --edition 2021 --crate-name "$crate" "$f" -o "$out" 2>>/tmp/rust-errors.log; then
              echo "FAIL: $f"; fail=1
            fi
          done < <(find "Week "* -maxdepth 2 -name "*.rs" -print0)
          if [ "$fail" -ne 0 ]; then echo "--- error log ---"; cat /tmp/rust-errors.log; exit 1; fi

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - name: Compile every Java file (skipping pedagogical fragments)
        run: |
          set -e
          mkdir -p /tmp/java-out
          fail=0
          # .ci-skip-java lists pedagogical fragment files (pseudocode / syntax demos
          # outside any class) that are not standalone programs and intentionally
          # do not compile. Lines starting with # are comments.
          skip_pattern=$(grep -v '^#' .ci-skip-java | grep -v '^$' || true)
          while IFS= read -r -d '' f; do
            if [ -n "$skip_pattern" ] && grep -qxF "$f" .ci-skip-java; then
              continue
            fi
            if ! javac -d /tmp/java-out "$f" 2>>/tmp/java-errors.log; then
              echo "FAIL: $f"; fail=1
            fi
          done < <(find "Week "* -maxdepth 2 -name "*.java" -print0)
          if [ "$fail" -ne 0 ]; then echo "--- error log ---"; cat /tmp/java-errors.log; exit 1; fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Run quality lint
        run: python scripts/quality_check.py --quiet

  tests-python:
    runs-on: ubuntu-latest
    needs: [python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Run correctness fixtures (Python harness)
        run: python tests/harness/harness.py --all --lang python

  tests-cpp:
    runs-on: ubuntu-latest
    needs: [cpp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Run correctness fixtures (C++ drivers)
        run: python tests/harness/harness.py --all --lang cpp

  tests-rust:
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      - name: Run correctness fixtures (Rust drivers)
        run: python tests/harness/harness.py --all --lang rust

  tests-java:
    runs-on: ubuntu-latest
    needs: [java]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Run correctness fixtures (Java harness)
        run: python tests/harness/harness.py --all --lang java

  coverage-report:
    runs-on: ubuntu-latest
    needs: [tests-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Generate test coverage report
        run: python scripts/coverage_report.py
