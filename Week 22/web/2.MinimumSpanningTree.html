<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Week 22 - MST (Kruskal & Prim)</title>
<style>
  body { font-family: ui-monospace, monospace; background:#0e1116; color:#e6edf3; margin:1rem; }
  h1 { color:#79c0ff; }
  pre#out { background:#161b22; padding:1rem; border:1px solid #30363d; white-space:pre; overflow:auto; }
</style>

<body>
<h1>Week 22 - Minimum Spanning Tree (Kruskal & Prim) + Union-Find</h1>
<pre id="out"></pre>

<script>
/*
 * WEEK 22 - WEB ADVANCED DSA
 * Topic: MST (Kruskal + Prim) and Union-Find
 * File: 2.MinimumSpanningTree.html
 *
 * CONCEPT:
 *   MST = spanning tree with minimum total weight. Kruskal sorts all
 *   edges and uses DSU to skip cycle-forming edges. Prim grows a single
 *   tree using a min-heap on candidate edges.
 *
 * KEY POINTS:
 *   - DSU with path compression + union by rank ~ O(alpha(n)).
 *   - Min-heap implemented manually since JS lacks one.
 *
 * ALGORITHM / APPROACH:
 *   See sibling files; identical structure.
 *
 * WEB-SPECIFIC NOTES vs JAVA:
 *   - Render output to <pre id="out">.
 *   - JS objects are loose; we use simple arrays/maps.
 *
 * DRY RUN:
 *   V=4, edges (0,1,4),(0,2,3),(1,2,1),(1,3,2),(2,3,4).
 *   Kruskal picks (1,2,1),(1,3,2),(0,2,3) -> total 6.
 *
 * COMPLEXITY:
 *   DSU op ~ O(alpha(n)). Kruskal O(E log E). Prim O((V+E) log V).
 */

const out = document.getElementById('out');
function log(...args) {
  const s = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
  out.textContent += s + '\n';
  console.log(...args);
}

class MinHeap {
  constructor() { this.a = []; }
  size() { return this.a.length; }
  push(x) { this.a.push(x); this._up(this.a.length - 1); }
  pop() {
    const top = this.a[0];
    const last = this.a.pop();
    if (this.a.length) { this.a[0] = last; this._down(0); }
    return top;
  }
  _up(i) {
    while (i > 0) {
      const p = (i - 1) >> 1;
      if (this.a[p][0] <= this.a[i][0]) break;
      [this.a[p], this.a[i]] = [this.a[i], this.a[p]];
      i = p;
    }
  }
  _down(i) {
    const n = this.a.length;
    while (true) {
      let l = 2*i + 1, r = 2*i + 2, s = i;
      if (l < n && this.a[l][0] < this.a[s][0]) s = l;
      if (r < n && this.a[r][0] < this.a[s][0]) s = r;
      if (s === i) break;
      [this.a[s], this.a[i]] = [this.a[i], this.a[s]];
      i = s;
    }
  }
}

class DSU {
  constructor(n) { this.parent = Array.from({length:n}, (_,i)=>i); this.rank = new Array(n).fill(0); }
  find(x) {
    let root = x;
    while (this.parent[root] !== root) root = this.parent[root];
    while (this.parent[x] !== root) { const nxt = this.parent[x]; this.parent[x] = root; x = nxt; }
    return root;
  }
  union(x, y) {
    let px = this.find(x), py = this.find(y);
    if (px === py) return false;
    if (this.rank[px] < this.rank[py]) { [px, py] = [py, px]; }
    this.parent[py] = px;
    if (this.rank[px] === this.rank[py]) this.rank[px]++;
    return true;
  }
  connected(x, y) { return this.find(x) === this.find(y); }
}

function kruskalMST(V, edges) {
  edges = edges.slice().sort((a,b) => a[2] - b[2]);
  const dsu = new DSU(V);
  let total = 0, used = 0;
  log('Kruskal MST edges:');
  for (const [u,v,w] of edges) {
    if (used === V - 1) break;
    if (dsu.union(u, v)) {
      total += w; used++;
      log(`  Edge (${u} - ${v}): weight ${w}`);
    }
  }
  return total;
}

function primMST(V, adj) {
  const inMST = new Array(V).fill(false);
  const key = new Array(V).fill(Infinity);
  const parent = new Array(V).fill(-1);
  key[0] = 0;
  const pq = new MinHeap();
  pq.push([0, 0]);
  let total = 0;
  log('Prim MST edges:');
  while (pq.size()) {
    const [w, u] = pq.pop();
    if (inMST[u]) continue;
    inMST[u] = true;
    total += w;
    if (parent[u] !== -1) log(`  Edge (${parent[u]} - ${u}): weight ${w}`);
    for (const [v, ew] of adj[u]) {
      if (!inMST[v] && ew < key[v]) {
        key[v] = ew;
        parent[v] = u;
        pq.push([ew, v]);
      }
    }
  }
  return total;
}

const V = 4;
const edges = [[0,1,4],[0,2,3],[1,2,1],[1,3,2],[2,3,4]];

log('=== Kruskal\'s MST ===');
log('Total MST weight: ' + kruskalMST(V, edges));

const adj = Array.from({length:V}, () => []);
for (const [u,v,w] of edges) { adj[u].push([v,w]); adj[v].push([u,w]); }
log('\n=== Prim\'s MST ===');
log('Total MST weight: ' + primMST(V, adj));

log('\n=== Union-Find Demo ===');
const dsu = new DSU(6);
dsu.union(0,1); dsu.union(2,3); dsu.union(4,5);
log('0 connected to 1: ' + dsu.connected(0, 1));
log('0 connected to 2: ' + dsu.connected(0, 2));
dsu.union(0, 2);
log('0 connected to 3: ' + dsu.connected(0, 3));
</script>
</body>
</html>
