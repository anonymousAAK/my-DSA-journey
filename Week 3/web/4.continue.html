<!--
WEEK 3 - WEB LOOPS & NUMBER THEORY
Topic: continue Statement
File: 4.continue.html

KEY POINTS:
 - In a for-loop, continue jumps to the update part.
 - In a while, increment your counter BEFORE continue.
 - JS supports labelled continue, like break.
-->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Week 3 - Continue</title>
<style>body{font-family:system-ui,sans-serif;max-width:720px;margin:2rem auto;padding:0 1rem}pre{background:#111;color:#0f0;padding:1rem;border-radius:6px}</style>
</head>
<body>
<h1>continue</h1>
<pre id="out"></pre>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const out = document.getElementById("out");
  const log = (...a) => { out.textContent += a.join(" ") + "\n"; };

  for (let i = 1; i <= 5; i++) {
    if (i === 3) continue;
    log(i);
  }

  log("---");

  let i = 1;
  while (i <= 5) {
    if (i === 3) { i++; continue; }
    log(i);
    i++;
  }
});
</script>
</body>
</html>

<!--
NOTES:
 - JS supports labelled continue too: `outer: for (...) { continue outer; }`.
-->
