<!--
  WEEK 7 - WEB DSA
  Topic: KMP String Search
  File: 3.kmp_search.html

  CONCEPT:
    Find all occurrences of pattern in text in O(n + m) using KMP and the
    longest-proper-prefix-suffix (LPS) array.

  KEY POINTS:
    - lps[i] is the length of the longest proper prefix of pat[0..i] that
      is also a suffix.
    - On a mismatch, jump j = lps[j-1] instead of restarting.
    - O(n + m) time, O(m) space.

  ALGORITHM / APPROACH:
    Same as Java/C++: build LPS, then walk text.

  WEB-SPECIFIC NOTES:
    - JS strings index by UTF-16 code units; for ASCII inputs that's safe.
    - text.matchAll(/pattern/g) is an ES standard alternative.

  DRY RUN:
    pat = "AABA" -> lps = [0,1,0,1]
    text "AABAACAADAABAABA" -> matches at [0, 9, 12]

  COMPLEXITY:
    Build LPS : O(m), O(m) space
    Search    : O(n + m), O(m) space
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Week 7 - KMP Search</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 1.5rem; }
  pre  { background: #111; color: #eee; padding: 1rem; border-radius: 8px; }
  h1   { font-size: 1.2rem; }
</style>
</head>
<body>
<h1>Week 7 - KMP Search</h1>
<pre id="out"></pre>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const out = document.getElementById("out");
  const lines = [];
  const log = (s) => { lines.push(s); console.log(s); };

  function buildLPS(pat) {
    const m = pat.length;
    const lps = new Array(m).fill(0);
    if (m === 0) return lps;
    let len = 0, i = 1;
    while (i < m) {
      if (pat[i] === pat[len]) {
        len++;
        lps[i] = len;
        i++;
      } else if (len !== 0) {
        len = lps[len - 1];
      } else {
        lps[i] = 0;
        i++;
      }
    }
    return lps;
  }

  function kmpSearch(text, pat) {
    const positions = [];
    const n = text.length, m = pat.length;
    if (m === 0 || m > n) return positions;
    const lps = buildLPS(pat);
    let i = 0, j = 0;
    while (i < n) {
      if (text[i] === pat[j]) { i++; j++; }
      if (j === m) {
        positions.push(i - j);
        j = lps[j - 1];
      } else if (i < n && text[i] !== pat[j]) {
        if (j !== 0) j = lps[j - 1];
        else i++;
      }
    }
    return positions;
  }

  function naiveSearch(text, pat) {
    const positions = [];
    const n = text.length, m = pat.length;
    if (m === 0 || m > n) return positions;
    for (let i = 0; i <= n - m; i++) {
      let ok = true;
      for (let j = 0; j < m; j++) {
        if (text[i + j] !== pat[j]) { ok = false; break; }
      }
      if (ok) positions.push(i);
    }
    return positions;
  }

  const text1 = "AABAACAADAABAABA";
  const pat1 = "AABA";
  log(`Text:    ${text1}`);
  log(`Pattern: ${pat1}`);
  log(`KMP found at:   [${kmpSearch(text1, pat1)}]`);
  log(`Naive found at: [${naiveSearch(text1, pat1)}]`);

  const text2 = "AAAAABAAABA";
  const pat2 = "AAAA";
  log(`\nText:    ${text2}`);
  log(`Pattern: ${pat2}`);
  log(`LPS: [${buildLPS(pat2)}]`);
  log(`KMP found at: [${kmpSearch(text2, pat2)}]`);

  log(`\nKMP("hello","xyz") = [${kmpSearch("hello","xyz")}]`);
  log(`KMP("hi","hello") = [${kmpSearch("hi","hello")}]`);

  out.textContent = lines.join("\n");
});
</script>
</body>
</html>

<!--
  NOTES — Web/JS vs Java:
    - JS Array doubles as Java's int[]; new Array(m).fill(0) initialises.
    - String.prototype.matchAll(/pat/g) provides a built-in iterator of matches.
    - For very large strings, prefer typed arrays (Int32Array) for the LPS.
-->
